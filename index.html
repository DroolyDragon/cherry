    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #120000;
        overflow: hidden;
      }

      video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        background: black;
      }

      .overlay {
        position: fixed;
        z-index: 999;
        top: 20px;
        left: 20px;
        color: red;
        font-family: Arial, sans-serif;
        text-shadow: 0 0 10px red;
        pointer-events: none;
      }

      .overlay h1 {
        font-size: 48px;
        margin: 0;
      }

      .overlay p {
        margin: 5px 0 0;
        font-size: 14px;
        max-width: 300px;
      }
    </style>
  </head>

  <body>

    <video id="v"
      src="/019c8029-10fe-70f3-9b0e-11ba1a9b69cd.mp4"
      playsinline
      autoplay
      muted
      controlslist="nodownload noplaybackrate noremoteplayback">
    </video>

    <script>
      const video = document.getElementById('v');

      video.controls = false;
      video.muted = false;
      video.volume = 1;

      video.addEventListener('contextmenu', e => e.preventDefault());

      document.body.style.background = "#120000";
      document.title = "cherry";

      function attemptClose() {
        try { window.close(); } catch (e) {}

        setTimeout(() => {
          location.href = "about:blank";
        }, 150);
      }

      async function attemptFullscreen() {
        try {
          if (document.fullscreenElement) return;

          if (document.documentElement.requestFullscreen) {
            await document.documentElement.requestFullscreen();
          }
        } catch (e) {}
      }

      let stopTimer;

      function startTimer() {
        if (stopTimer) clearTimeout(stopTimer);

        stopTimer = setTimeout(() => {
          try { video.pause(); } catch (e) {}
          attemptClose();
        }, 1000);
      }

      video.addEventListener('play', () => {
        startTimer();
        attemptFullscreen();
      });

      video.addEventListener('playing', () => {
        startTimer();
        attemptFullscreen();
      });

      video.addEventListener('pause', () => {
        clearTimeout(stopTimer);
      });

      video.addEventListener('ended', () => {
        clearTimeout(stopTimer);
        attemptClose();
      });

      function resume() {
        video.play().catch(()=>{});
        attemptFullscreen();

        window.removeEventListener('click', resume);
        window.removeEventListener('touchstart', resume);
      }

      window.addEventListener('click', resume, { passive: true });
      window.addEventListener('touchstart', resume, { passive: true });

      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(attemptFullscreen, 100);
      });
    </script>

  </body>
